<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Months</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 2rem;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .welcome-message {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #007bff;
        }
        .months-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .month-card {
            background-color: #e9ecef;
            padding: 1rem;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            color: #495057;
        }
        .month-card:hover {
            background-color: #dee2e6;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-message" id="welcomeMessage">
            Welcome!
        </div>
        <h2>Select a Month</h2>
        <div class="months-grid">
            <div class="month-card" onclick="goToWorkingRecord('January')">January</div>
            <div class="month-card" onclick="goToWorkingRecord('February')">February</div>
            <div class="month-card" onclick="goToWorkingRecord('March')">March</div>
            <div class="month-card" onclick="goToWorkingRecord('April')">April</div>
            <div class="month-card" onclick="goToWorkingRecord('May')">May</div>
            <div class="month-card" onclick="goToWorkingRecord('June')">June</div>
            <div class="month-card" onclick="goToWorkingRecord('July')">July</div>
            <div class="month-card" onclick="goToWorkingRecord('August')">August</div>
            <div class="month-card" onclick="goToWorkingRecord('September')">September</div>
            <div class="month-card" onclick="goToWorkingRecord('October')">October</div>
            <div class="month-card" onclick="goToWorkingRecord('November')">November</div>
            <div class="month-card" onclick="goToWorkingRecord('December')">December</div>
        </div>
    </div>

    <script>
        // Extract the username from the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');

        // Display the welcome message with the username if it exists
        if (username) {
            document.getElementById('welcomeMessage').innerText = 'Welcome, ' + username + '!';
        }

        // Function to navigate to the working record table with selected month and username
        function goToWorkingRecord(monthName) {
            let targetUrl = 'working-record-table.html?month=' + encodeURIComponent(monthName);
            if (username) {
                targetUrl += '&username=' + encodeURIComponent(username);
            }
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
