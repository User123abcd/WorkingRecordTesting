<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Working Record Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 2rem;
            margin: 0;
        }
        .header-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 1000px;
            margin: 0 auto;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .table-title {
            margin: 0;
            color: #333;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        .btn-primary {
            background-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            color: #495057;
        }
        .row-actions {
            display: flex;
            gap: 5px;
        }
        .btn-update {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-update:hover {
            background-color: #218838;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
        .empty-message {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <a href="login.html" class="logout-btn">Logout</a>
    </div>

    <div class="container">
        <div class="table-header">
            <h2 class="table-title">Working Record - <span id="displayMonth">Month</span></h2>
            <div class="action-buttons">
                <a href="#" id="backBtn" class="btn btn-secondary">Back to Months</a>
                <button class="btn btn-primary" onclick="goToAddNewRecord()">Add New Record</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>AM</th>
                    <th>PM</th>
                    <th>100%</th>
                    <th>150%</th>
                    <th>200%</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data rows will be dynamically inserted here -->
            </tbody>
        </table>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const month = urlParams.get('month') || 'January';
        const username = urlParams.get('username') || 'admin';

        // Display the selected month in the title
        document.getElementById('displayMonth').innerText = month;

        // Set up the back button
        backBtn.href = 'months.html?username=' + encodeURIComponent(username);

        // Navigate to the Add New Record page
        function goToAddNewRecord() {
            window.location.href = `add-new-record.html?month=${encodeURIComponent(month)}&username=${encodeURIComponent(username)}`;
        }

        function goToUpdateRecord(id) {
             window.location.href = `update-record.html?id=${id}&month=${encodeURIComponent(month)}&username=${encodeURIComponent(username)}`;
        }

        // Function to load and render records from the server
        function loadRecords() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ''; // Clear current rows

            // Fetch records for this specific month and user
            fetch(`/api/records?month=${encodeURIComponent(month)}&username=${encodeURIComponent(username)}`)
                .then(response => response.json())
                .then(records => {
                    if (records.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="8" class="empty-message">No records found for ${month}. Click "Add New Record".</td></tr>`;
                        return;
                    }

                    records.forEach(record => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${record.date}</td>
                            <td>${record.category}</td>
                            <td>${record.am}</td>
                            <td>${record.pm}</td>
                            <td>${record.p100}</td>
                            <td>${record.p150}</td>
                            <td>${record.p200}</td>
                            <td class="row-actions">
                                <button class="btn-update" onclick="goToUpdateRecord(${record.id})">Update</button>
                                <button class="btn-delete" onclick="deleteRecord(${record.id})">Delete</button>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error fetching records:', error);
                    tableBody.innerHTML = `<tr><td colspan="8" class="empty-message">Error loading records.</td></tr>`;
                });
        }

        // Function to handle deleting a record
        function deleteRecord(id) {
            if(confirm("Are you sure you want to delete this record?")) {
                fetch(`/api/records/${id}`, { method: 'DELETE' })
                    .then(response => {
                        if (response.ok) {
                            loadRecords(); // Reload the table on success
                        } else {
                            alert('Error deleting record!');
                        }
                    });
            }
        }

        // Load records when the page finishes loading
        window.onload = loadRecords;
    </script>
</body>
</html>
